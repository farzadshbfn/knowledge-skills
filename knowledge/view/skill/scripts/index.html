<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KB Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" class="hljs-theme" data-hljs-mode="light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" class="hljs-theme" data-hljs-mode="dark" disabled>
<script src="/graph.js"></script>
<style>
/* --- Theme: light (default) --- */
:root, [data-theme="light"] {
  --sidebar-w: 280px;
  --bg: #fafafa;
  --sidebar-bg: #1e1e2e;
  --sidebar-fg: #cdd6f4;
  --sidebar-dim: #6c7086;
  --sidebar-hover: #313244;
  --sidebar-active: #45475a;
  --accent: #89b4fa;
  --accent-dim: #585b70;
  --text: #1e1e2e;
  --text-dim: #6c7086;
  --border: #e0e0e0;
  --code-bg: #f5f5f5;
  --card-bg: #fff;
  --search-bg: #11111b;
  --link: #2563eb;
  --error: #f38ba8;
  --edge: #7c8aaa;
  --edge-active: #b0bec5;
  --edge-overlay: #4a5568;
  --shadow: rgba(0,0,0,0.08);
  --shadow-lg: rgba(0,0,0,0.15);
  --accent-tint: rgba(137,180,250,0.06);
  --accent-tint-subtle: rgba(137,180,250,0.05);
  --fade-bg: #e8e8e8;
}

/* --- Theme: dark --- */
[data-theme="dark"] {
  --bg: #1e1e2e;
  --sidebar-bg: #11111b;
  --sidebar-fg: #cdd6f4;
  --sidebar-dim: #6c7086;
  --sidebar-hover: #313244;
  --sidebar-active: #45475a;
  --accent: #89b4fa;
  --accent-dim: #585b70;
  --text: #cdd6f4;
  --text-dim: #a6adc8;
  --border: #313244;
  --code-bg: #181825;
  --card-bg: #1e1e2e;
  --search-bg: #11111b;
  --link: #89b4fa;
  --error: #f38ba8;
  --edge: #8890a8;
  --edge-active: #7c8aaa;
  --edge-overlay: #89b4fa;
  --shadow: rgba(0,0,0,0.3);
  --shadow-lg: rgba(0,0,0,0.4);
  --accent-tint: rgba(137,180,250,0.1);
  --accent-tint-subtle: rgba(137,180,250,0.08);
  --fade-bg: #313244;
}

/* System preference auto-detection */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #1e1e2e;
    --sidebar-bg: #11111b;
    --sidebar-fg: #cdd6f4;
    --sidebar-dim: #6c7086;
    --sidebar-hover: #313244;
    --sidebar-active: #45475a;
    --accent: #89b4fa;
    --accent-dim: #585b70;
    --text: #cdd6f4;
    --text-dim: #a6adc8;
    --border: #313244;
    --code-bg: #181825;
    --card-bg: #1e1e2e;
    --search-bg: #11111b;
    --link: #89b4fa;
    --error: #f38ba8;
    --edge: #8890a8;
    --edge-active: #7c8aaa;
    --edge-overlay: #89b4fa;
    --shadow: rgba(0,0,0,0.3);
    --shadow-lg: rgba(0,0,0,0.4);
    --accent-tint: rgba(137,180,250,0.1);
    --accent-tint-subtle: rgba(137,180,250,0.08);
    --fade-bg: #313244;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* --- Sidebar --- */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  color: var(--sidebar-fg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.15s, min-width 0.15s;
}
#sidebar.collapsed { width: 0; min-width: 0; }
#sidebar.collapsed #sidebar-header,
#sidebar.collapsed #sidebar-tree { display: none; }

#sidebar-toggle {
  position: fixed;
  bottom: 16px;
  left: var(--sidebar-w);
  z-index: 200;
  transform: translateX(-50%);
  background: var(--sidebar-bg);
  color: var(--sidebar-fg);
  border: 1px solid var(--accent-dim);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: left 0.15s;
}
#sidebar-toggle:hover { background: var(--sidebar-hover); }
#sidebar.collapsed ~ #sidebar-toggle { left: 0; transform: translateX(8px); }

#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--accent-dim);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--accent);
}

#sidebar-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  font-size: 13px;
}

.tree-kb-label {
  padding: 8px 16px 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--sidebar-dim);
}

.tree-item {
  display: flex;
  align-items: center;
  padding: 4px 8px 4px calc(8px + var(--depth, 0) * 16px);
  cursor: pointer;
  border-radius: 4px;
  margin: 1px 4px;
  gap: 4px;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tree-item:hover { background: var(--sidebar-hover); }
.tree-item.active { background: var(--sidebar-active); color: var(--accent); }

.tree-arrow {
  width: 16px;
  height: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 10px;
  transition: transform 0.15s;
  color: var(--sidebar-dim);
}
.tree-arrow.expanded { transform: rotate(90deg); }
.tree-arrow.empty { visibility: hidden; }

.tree-icon {
  flex-shrink: 0;
  width: 16px;
  text-align: center;
  font-size: 12px;
}

.tree-label {
  overflow: hidden;
  text-overflow: ellipsis;
}

.tree-children { display: none; }
.tree-children.open { display: block; }

.tree-badge {
  font-size: 10px;
  background: var(--accent-dim);
  color: var(--sidebar-fg);
  padding: 1px 5px;
  border-radius: 8px;
  margin-left: auto;
  flex-shrink: 0;
}

/* --- Main content --- */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* --- Search bar --- */
#search-bar {
  padding: 12px 24px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  position: relative;
}

#search-input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  background: var(--card-bg);
  color: var(--text);
}
#search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-tint); }

/* --- Search results overlay --- */
#search-results {
  display: none;
  position: absolute;
  top: 100%;
  left: 24px;
  right: 24px;
  z-index: 100;
  background: var(--card-bg);
  border-radius: 0 0 8px 8px;
  box-shadow: 0 4px 16px var(--shadow-lg);
  max-height: 400px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-top: none;
}
#search-results.visible { display: block; }
#search-results-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--code-bg);
  position: sticky;
  top: 0;
  z-index: 1;
}
#search-results-header h3 { font-size: 13px; color: var(--text-dim); font-weight: 500; }
#search-results-close {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-dim);
  line-height: 1;
}
.search-result {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.search-result:last-child { border-bottom: none; }
.search-result:hover { background: var(--accent-tint); }
.search-result-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.search-result-desc {
  font-size: 12px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.search-result-path {
  font-size: 11px;
  color: var(--accent-dim);
  font-family: "SF Mono", "Fira Code", monospace;
}
.search-result-top {
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-no-results {
  padding: 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}
.fuzzy-hl {
  color: var(--link);
  font-weight: 600;
}

/* --- Breadcrumb --- */
#breadcrumb {
  padding: 8px 24px;
  font-size: 12px;
  color: var(--text-dim);
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
}
#breadcrumb a { color: var(--accent); text-decoration: none; cursor: pointer; }
#breadcrumb a:hover { text-decoration: underline; }
#breadcrumb span.sep { margin: 0 4px; }

/* --- Content area --- */
#content-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  position: relative;
}

#content {
  max-width: 820px;
  margin: 0 auto;
  background: var(--card-bg);
  border-radius: 8px;
  padding: 32px 40px;
  box-shadow: 0 1px 3px var(--shadow);
}

/* Source toggle toolbar — overlays content, zero height so no flow impact */
#content-toolbar {
  position: sticky;
  top: 8px;
  z-index: 10;
  height: 0;
  overflow: visible;
  max-width: 820px;
  margin: 0 auto;
  text-align: right;
  pointer-events: none;
}
#source-toggle {
  pointer-events: auto;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 1px 4px var(--shadow);
}
#source-toggle:hover { background: var(--border); color: var(--text); }
#content-source {
  display: none;
  white-space: pre-wrap;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  padding: 32px 40px;
}
#content-source.visible { display: block; }
#content-source.visible + #content { display: none; }

/* Meta table */
.file-meta {
  margin-bottom: 24px;
}
.file-meta table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.file-meta td {
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.file-meta tr:last-child td { border-bottom: none; }
.file-meta td:first-child {
  width: 120px;
  font-weight: 600;
  color: var(--text-dim);
  background: var(--code-bg);
  white-space: nowrap;
}
.file-meta td:last-child { color: var(--text); word-break: break-word; }

/* Markdown styles */
#content h1 { font-size: 28px; margin: 24px 0 12px; }
#content h2 { font-size: 22px; margin: 20px 0 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
#content h3 { font-size: 18px; margin: 16px 0 8px; }
#content h4 { font-size: 15px; margin: 12px 0 6px; }
#content p { margin: 8px 0; line-height: 1.7; }
#content ul, #content ol { margin: 8px 0 8px 24px; }
#content li { margin: 4px 0; line-height: 1.6; }
#content a { color: var(--link); text-decoration: none; }
#content a:hover { text-decoration: underline; }
#content code {
  background: var(--code-bg);
  padding: 2px 5px;
  border-radius: 3px;
  font-size: 0.9em;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
}
#content pre {
  background: var(--code-bg);
  padding: 16px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 12px 0;
}
#content pre code { background: none; padding: 0; font-size: 13px; }
#content blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  margin: 12px 0;
  color: var(--text-dim);
  background: var(--accent-tint-subtle);
  border-radius: 0 4px 4px 0;
}
#content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
#content th, #content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
#content th { background: var(--code-bg); font-weight: 600; }
#content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
#content img { max-width: 100%; border-radius: 4px; }

/* Welcome / empty state */
.welcome { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
.welcome p { font-size: 14px; line-height: 1.6; }

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Loading state for sidebar */
.tree-loading {
  padding: 20px 16px;
  color: var(--sidebar-dim);
  font-size: 13px;
}

/* --- View toggle in sidebar header --- */
#view-toggle {
  display: inline-flex;
  gap: 2px;
  margin-left: 12px;
  background: var(--sidebar-hover);
  border-radius: 4px;
  padding: 2px;
}
.view-btn {
  background: none;
  border: none;
  color: var(--sidebar-dim);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
}
.view-btn.active {
  background: var(--accent-dim);
  color: var(--sidebar-fg);
}
.view-btn:hover:not(.active) { color: var(--sidebar-fg); }

/* --- Mind map --- */
#graph-wrap {
  flex: 1;
  overflow: hidden;
  display: none;
  background: var(--bg);
  position: relative;
}
#graph-wrap.active { display: flex; }
#graph-wrap svg { width: 100%; height: 100%; }
/* --- Graph controls panel --- */
#graph-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  z-index: 50;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 2px 8px var(--shadow);
  font-size: 12px;
  min-width: 200px;
}
#graph-controls.collapsed .gc-body { display: none; }
#graph-controls.collapsed { min-width: auto; }
.gc-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 6px 12px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-dim);
}
.gc-toggle:hover { color: var(--text); }
.gc-body {
  padding: 8px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.gc-body label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}
.gc-body label::first-line { }
.gc-label-text { display: inline-block; width: 62px; flex-shrink: 0; }
.gc-body input[type="range"] { flex: 1; min-width: 80px; }
.gc-body span { min-width: 40px; text-align: right; font-family: monospace; font-size: 10px; }
.gc-body select { font-size: 11px; padding: 2px 4px; }
/* --- Theme toggle --- */
#theme-toggle-wrap {
  padding: 8px 16px;
  border-top: 1px solid var(--accent-dim);
}
#theme-toggle {
  background: none;
  border: 1px solid var(--accent-dim);
  border-radius: 4px;
  color: var(--sidebar-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 8px;
  width: 100%;
}
#theme-toggle:hover { color: var(--sidebar-fg); border-color: var(--accent); }

.mm-edge { stroke: var(--edge); fill: none; }
.mm-node { cursor: grab; }
.mm-node:active { cursor: grabbing; }
.mm-label {
  font-size: 11px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  fill: var(--text);
  pointer-events: none;
  text-anchor: middle;
}
.mm-hull {
  stroke-width: 1;
  stroke-dasharray: 6 3;
}
.mm-hull-label {
  font-size: 13px;
  font-weight: 600;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-transform: uppercase;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <span>KB Viewer</span>
    <span id="view-toggle">
      <button class="view-btn active" data-view="tree" onclick="setView('tree')">Tree</button>
      <button class="view-btn" data-view="graph" onclick="setView('graph')">Graph</button>
    </span>
  </div>
  <div id="sidebar-tree"><div class="tree-loading"><span class="spinner"></span> Loading...</div></div>
  <div id="theme-toggle-wrap">
    <button id="theme-toggle" onclick="cycleTheme()" title="Toggle theme">&#9788;</button>
  </div>
</div>
<button id="sidebar-toggle" onclick="const s=document.getElementById('sidebar');s.classList.toggle('collapsed');this.innerHTML=s.classList.contains('collapsed')?'&#x00BB;':'&#x00AB;'" title="Toggle sidebar">&#x00AB;</button>

<div id="main">
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Fuzzy search notes..." autocomplete="off">
    <div id="search-results">
      <div id="search-results-header">
        <h3 id="search-results-count"></h3>
        <button id="search-results-close" onclick="closeSearch()">&times;</button>
      </div>
      <div id="search-results-body"></div>
    </div>
  </div>
  <div id="breadcrumb"></div>
  <div id="graph-wrap"><svg id="graph-svg"></svg></div>
  <div id="content-wrap">
    <div id="content-toolbar">
      <button id="source-toggle" style="display:none" onclick="toggleSource()">&lt;/&gt; Source</button>
    </div>
    <div id="content-source"></div>
    <div id="content">
      <div class="welcome">
        <h2>Knowledge Base Viewer</h2>
        <p>Select a note from the sidebar to start reading,<br>or use the search bar to fuzzy-find across all knowledge bases.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Theme: light / dark / system
// ---------------------------------------------------------------------------
const themeOrder = ["system", "light", "dark"];
const themeIcons = { system: "\u2699", light: "\u2600", dark: "\u263D" };
let currentTheme = localStorage.getItem("kb-theme") || "system";

function applyTheme(theme) {
  currentTheme = theme;
  localStorage.setItem("kb-theme", theme);
  if (theme === "system") {
    document.documentElement.removeAttribute("data-theme");
  } else {
    document.documentElement.setAttribute("data-theme", theme);
  }
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.innerHTML = themeIcons[theme] + " " + theme.charAt(0).toUpperCase() + theme.slice(1);

  // Toggle highlight.js theme
  const isDark = theme === "dark" || (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
  document.querySelectorAll("link.hljs-theme").forEach(link => {
    link.disabled = (link.dataset.hljsMode === "dark") !== isDark;
  });

  // Re-initialize mermaid with matching theme
  reinitMermaid();
}

function cycleTheme() {
  const idx = (themeOrder.indexOf(currentTheme) + 1) % themeOrder.length;
  applyTheme(themeOrder[idx]);
}

applyTheme(currentTheme);

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let treeData = null;
let kbConfig = null;
let currentPath = null;
let allNotes = [];      // flat list for search
let nodeByPath = {};    // path -> tree node lookup
let treeRowByPath = {}; // file path -> { row, childrenWrap, arrow } for sidebar reveal
let searchTimer = null;
let headerMap = {};     // slug -> DOM element for current doc
let contentRenderedHeight = 0;
let contentSourceHeight = 0;

// ---------------------------------------------------------------------------
// Mermaid initialization
// ---------------------------------------------------------------------------
function _isDark() {
  const t = currentTheme || "system";
  return t === "dark" || (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
}
function reinitMermaid() {
  if (typeof mermaid !== "undefined") {
    mermaid.initialize({ startOnLoad: false, theme: _isDark() ? "dark" : "default" });
  }
}
reinitMermaid();

// ---------------------------------------------------------------------------
// Marked renderer — internal links use data-href to prevent browser navigation
// ---------------------------------------------------------------------------
marked.use({
  renderer: {
    link(href, title, text) {
      const titleAttr = title ? ` title="${esc(title)}"` : "";
      if (href.startsWith("http://") || href.startsWith("https://")) {
        return `<a href="${esc(href)}" target="_blank" rel="noopener"${titleAttr}>${text}</a>`;
      }
      return `<a href="javascript:void(0)" data-href="${esc(href)}"${titleAttr}>${text}</a>`;
    }
  }
});

// ---------------------------------------------------------------------------
// Initialization
// ---------------------------------------------------------------------------
async function init() {
  try {
    const [treeRes, configRes] = await Promise.all([
      fetch("/api/tree"),
      fetch("/api/config"),
    ]);
    treeData = await treeRes.json();
    kbConfig = await configRes.json();
    buildNodeIndex(treeData);
    renderTree();
    allNotes = collectNotes(treeData);
  } catch (e) {
    document.getElementById("sidebar-tree").innerHTML =
      `<div class="tree-loading" style="color:var(--error)">Failed to load KB tree: ${e.message}</div>`;
  }
}

// ---------------------------------------------------------------------------
// Node path index (for breadcrumb folder navigation)
// ---------------------------------------------------------------------------
function buildNodeIndex(data) {
  nodeByPath = {};
  if (!data || !data.kbs) return;
  for (const kb of data.kbs) {
    if (kb.tree) indexNode(kb.tree);
  }
}

function indexNode(node) {
  if (node.path) nodeByPath[node.path] = node;
  if (node.children) {
    for (const child of Object.values(node.children)) indexNode(child);
  }
}

// ---------------------------------------------------------------------------
// Collect all notes from tree (flat list for search)
// ---------------------------------------------------------------------------
function collectNotes(data) {
  const notes = [];
  if (!data || !data.kbs) return notes;
  for (const kb of data.kbs) {
    if (kb.tree) walkNode(kb.tree, kb.kb_name, notes);
  }
  return notes;
}

function walkNode(node, kbName, out) {
  if (node.index) {
    out.push({ ...node.index, kb: kbName });
  }
  if (node.notes) {
    for (const n of node.notes) out.push({ ...n, kb: kbName });
  }
  if (node.skill) {
    out.push({ ...node.skill, kb: kbName });
  }
  if (node.children) {
    for (const key of Object.keys(node.children)) {
      walkNode(node.children[key], kbName, out);
    }
  }
}

// ---------------------------------------------------------------------------
// Fuzzy matching (mirrors serve.py fuzzy_match)
// ---------------------------------------------------------------------------
function fuzzyMatch(query, candidate) {
  const q = query.toLowerCase();
  const c = candidate.toLowerCase();
  if (!q) return { gap: 0, start: 0, end: 0 };
  if (q.length > c.length) return null;

  let bestGap = null;
  let bestStart = 0;
  let bestEnd = 0;
  let qi = 0;
  let ci = 0;

  while (ci < c.length) {
    if (c[ci] === q[qi]) {
      qi++;
      if (qi === q.length) {
        const end = ci;
        qi = q.length - 1;
        while (qi >= 0) {
          if (c[ci] === q[qi]) qi--;
          ci--;
        }
        ci++;
        const gap = (end - ci + 1) - q.length;
        if (bestGap === null || gap < bestGap) {
          bestGap = gap;
          bestStart = ci;
          bestEnd = end;
        }
        qi = 0;
        ci++;
        continue;
      }
    }
    ci++;
  }

  if (bestGap === null) return null;
  return { gap: bestGap, start: bestStart, end: bestEnd };
}

// Highlight matched characters in the best window
function highlightMatch(query, text, start, end) {
  const q = query.toLowerCase();
  const window = text.slice(start, end + 1);
  let html = esc(text.slice(0, start));

  // Walk through window, marking chars that match query
  let qi = 0;
  for (let i = 0; i < window.length; i++) {
    const ch = window[i];
    if (qi < q.length && ch.toLowerCase() === q[qi]) {
      html += `<span class="fuzzy-hl">${esc(ch)}</span>`;
      qi++;
    } else {
      html += esc(ch);
    }
  }

  html += esc(text.slice(end + 1));
  return html;
}

// ---------------------------------------------------------------------------
// KB name resolution (path prefix -> KB name)
// ---------------------------------------------------------------------------
function findKbForPath(path) {
  if (!kbConfig || !kbConfig.kb_roots) return null;
  for (const entry of kbConfig.kb_roots) {
    const norm = entry.path.replace(/^\.\//, "");
    if (path.startsWith(norm + "/") || path.startsWith("./" + norm + "/")) {
      return entry;
    }
  }
  return null;
}

// Convert filesystem path to URL path (e.g. "knowledge/foo.md" -> "core/foo.md")
function toUrlPath(fsPath) {
  const kb = findKbForPath(fsPath);
  if (!kb) return fsPath;
  const norm = kb.path.replace(/^\.\//, "");
  if (fsPath.startsWith(norm + "/")) return kb.name + fsPath.slice(norm.length);
  if (fsPath.startsWith("./" + norm + "/")) return kb.name + fsPath.slice(norm.length + 2);
  return fsPath;
}

// Convert URL path to filesystem path (e.g. "core/foo.md" -> "knowledge/foo.md")
function fromUrlPath(urlPath) {
  if (!kbConfig || !kbConfig.kb_roots) return urlPath;
  for (const entry of kbConfig.kb_roots) {
    if (urlPath.startsWith(entry.name + "/")) {
      return entry.path + urlPath.slice(entry.name.length);
    }
  }
  return urlPath;
}

// ---------------------------------------------------------------------------
// Tree rendering
// ---------------------------------------------------------------------------
function renderTree() {
  const container = document.getElementById("sidebar-tree");
  container.innerHTML = "";
  treeRowByPath = {};

  if (!treeData || !treeData.kbs) return;

  for (const kb of treeData.kbs) {
    const label = document.createElement("div");
    label.className = "tree-kb-label";
    label.textContent = (kb.kb_name || "default") + " \u25BE";
    label.style.cursor = "pointer";
    container.appendChild(label);

    const kbWrap = document.createElement("div");
    kbWrap.className = "tree-children open";
    container.appendChild(kbWrap);

    label.addEventListener("click", () => {
      const isOpen = kbWrap.classList.toggle("open");
      label.textContent = (kb.kb_name || "default") + (isOpen ? " \u25BE" : " \u25B8");
      // Load/focus the KB root index
      if (kb.tree && kb.tree.index) {
        const path = kb.tree.index.path;
        if (typeof currentView !== "undefined" && currentView === "graph") focusGraphNode(path);
        else loadFile(path);
      }
    });

    if (kb.tree && kb.tree.children) {
      const sorted = Object.keys(kb.tree.children).sort();
      for (const key of sorted) {
        kbWrap.appendChild(buildTreeNode(key, kb.tree.children[key], 0));
      }
    }
  }
}

function buildTreeNode(label, node, depth) {
  const frag = document.createDocumentFragment();
  const hasChildren = node.children && Object.keys(node.children).length > 0;
  const hasNotes = node.notes && node.notes.length > 0;
  const expandable = hasChildren || hasNotes;

  const row = document.createElement("div");
  row.className = "tree-item";
  row.style.setProperty("--depth", depth);

  const arrow = document.createElement("span");
  arrow.className = "tree-arrow" + (expandable ? "" : " empty");
  arrow.textContent = "\u25B6";
  row.appendChild(arrow);

  const icon = document.createElement("span");
  icon.className = "tree-icon";
  icon.textContent = "\uD83D\uDCC2";
  row.appendChild(icon);

  const lbl = document.createElement("span");
  lbl.className = "tree-label";
  lbl.textContent = node.index ? node.index.name : label;
  lbl.title = node.index ? node.index.description || "" : label;
  row.appendChild(lbl);

  if (node.skill) {
    const badge = document.createElement("span");
    badge.className = "tree-badge";
    badge.textContent = "skill";
    row.appendChild(badge);
  }

  const childrenWrap = document.createElement("div");
  childrenWrap.className = "tree-children";

  // Register for sidebar reveal
  if (node.index) treeRowByPath[node.index.path] = { row, childrenWrap, arrow };
  if (node.skill) treeRowByPath[node.skill.path] = { row, childrenWrap, arrow };

  // Folder click -> load the folder's index.md (no folder view)
  row.addEventListener("click", (e) => {
    e.stopPropagation();
    if (expandable) {
      const isOpen = childrenWrap.classList.toggle("open");
      arrow.classList.toggle("expanded", isOpen);
    }
    const filePath = node.index ? node.index.path : node.skill ? node.skill.path : null;
    if (filePath) {
      if (typeof currentView !== "undefined" && currentView === "graph") focusGraphNode(filePath);
      else loadFile(filePath);
    }
  });

  frag.appendChild(row);

  if (hasNotes) {
    for (const note of node.notes) {
      const noteRow = document.createElement("div");
      noteRow.className = "tree-item";
      noteRow.style.setProperty("--depth", depth + 1);

      const noteArrow = document.createElement("span");
      noteArrow.className = "tree-arrow empty";
      noteArrow.textContent = "\u25B6";
      noteRow.appendChild(noteArrow);

      const noteIcon = document.createElement("span");
      noteIcon.className = "tree-icon";
      noteIcon.textContent = "\uD83D\uDCC4";
      noteRow.appendChild(noteIcon);

      const noteLbl = document.createElement("span");
      noteLbl.className = "tree-label";
      noteLbl.textContent = note.name || note.path.split("/").pop();
      noteLbl.title = note.description || "";
      noteRow.appendChild(noteLbl);

      noteRow.addEventListener("click", (e) => {
        e.stopPropagation();
        if (typeof currentView !== "undefined" && currentView === "graph") focusGraphNode(note.path);
        else loadFile(note.path);
      });

      treeRowByPath[note.path] = { row: noteRow, childrenWrap: null, arrow: null };
      childrenWrap.appendChild(noteRow);
    }
  }

  if (hasChildren) {
    const sorted = Object.keys(node.children).sort();
    for (const key of sorted) {
      childrenWrap.appendChild(buildTreeNode(key, node.children[key], depth + 1));
    }
  }

  frag.appendChild(childrenWrap);
  return frag;
}

// ---------------------------------------------------------------------------
// File loading
// ---------------------------------------------------------------------------
async function loadFile(path, { pushHistory = true } = {}) {
  currentPath = path;
  updateBreadcrumb(path);
  closeSearch();

  if (pushHistory) {
    history.pushState({ path }, "", "/" + toUrlPath(path));
  }

  const content = document.getElementById("content");
  content.innerHTML = '<div class="tree-loading"><span class="spinner"></span> Loading...</div>';

  try {
    const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
    const data = await res.json();

    if (data.error) {
      content.innerHTML = `<div class="welcome"><h2>Error</h2><p>${data.error}</p></div>`;
      return;
    }

    let html = "";

    // Frontmatter as table
    if (data.meta && Object.keys(data.meta).length > 0) {
      html += '<div class="file-meta"><table>';
      for (const [key, val] of Object.entries(data.meta)) {
        html += `<tr><td>${esc(key)}</td><td>${esc(val)}</td></tr>`;
      }
      html += '</table></div>';
    }

    // Render markdown body
    const rawBody = data.body || "";
    html += marked.parse(rawBody);
    content.innerHTML = html;

    // Store full raw source for toggle (reconstruct frontmatter + body)
    const srcEl = document.getElementById("content-source");
    let fullSource = "";
    if (data.meta && Object.keys(data.meta).length > 0) {
      fullSource += "---\n";
      for (const [key, val] of Object.entries(data.meta)) fullSource += `${key}: ${val}\n`;
      fullSource += "---\n\n";
    }
    fullSource += rawBody;
    srcEl.textContent = fullSource;
    srcEl.classList.remove("visible");
    document.getElementById("source-toggle").style.display = "";
    document.getElementById("source-toggle").innerHTML = "&lt;/&gt; Source";

    // Convert mermaid code blocks: <pre><code class="language-mermaid"> → <pre class="mermaid">
    content.querySelectorAll("pre code.language-mermaid").forEach((el) => {
      const pre = el.parentElement;
      pre.className = "mermaid";
      pre.textContent = el.textContent;
    });

    content.querySelectorAll("pre code").forEach((el) => hljs.highlightElement(el));

    // Render mermaid diagrams
    const mermaidEls = content.querySelectorAll("pre.mermaid");
    if (mermaidEls.length > 0) {
      await mermaid.run({ nodes: mermaidEls });
    }

    // Build header map from rendered DOM
    buildHeaderMap();

    // Store content heights (source is hidden, so briefly show to measure)
    requestAnimationFrame(() => {
      contentRenderedHeight = content.scrollHeight;
      // Temporarily show source off-screen to measure its height
      srcEl.style.display = "block";
      srcEl.style.visibility = "hidden";
      srcEl.style.position = "absolute";
      contentSourceHeight = srcEl.scrollHeight;
      srcEl.style.display = "";
      srcEl.style.visibility = "";
      srcEl.style.position = "";
    });

    // Reveal current file in sidebar tree
    revealTreePath(path);

  } catch (e) {
    content.innerHTML = `<div class="welcome"><h2>Error</h2><p>${e.message}</p></div>`;
    document.getElementById("source-toggle").style.display = "none";
  }
}

function slugify(text) {
  return text.toLowerCase().replace(/[^\w\s-]/g, "").replace(/\s+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
}

function buildHeaderMap() {
  headerMap = {};
  const content = document.getElementById("content");
  content.querySelectorAll("h1, h2, h3, h4, h5, h6").forEach((el) => {
    const slug = slugify(el.textContent);
    el.id = slug; // set ID so URL anchors also work
    headerMap[slug] = el;
  });
}

function scrollToHeader(slug) {
  const el = headerMap[slug];
  if (!el) return false;
  const wrap = document.getElementById("content-wrap");
  // #content-wrap has position:relative — walk offsetParent chain to it
  let top = 0;
  let node = el;
  while (node && node !== wrap) {
    top += node.offsetTop;
    node = node.offsetParent;
  }
  wrap.scrollTop = top;
  return true;
}

function resolvePath(from, rel) {
  const parts = from.split("/");
  parts.pop();
  for (const p of rel.split("/")) {
    if (p === "..") parts.pop();
    else if (p !== "." && p !== "") parts.push(p);
  }
  return parts.join("/");
}

function toggleSource() {
  const srcEl = document.getElementById("content-source");
  const btn = document.getElementById("source-toggle");
  const wrap = document.getElementById("content-wrap");
  const content = document.getElementById("content");

  // Focal point: 1/3 down the visible viewport
  const focal = wrap.clientHeight / 3;
  const wasSource = srcEl.classList.contains("visible");
  const fromHeight = wasSource ? contentSourceHeight : contentRenderedHeight;
  const ratio = fromHeight > 0 ? (wrap.scrollTop + focal) / fromHeight : 0;

  // Toggle
  const isSource = srcEl.classList.toggle("visible");
  btn.innerHTML = isSource ? "&#9881; Rendered" : "&lt;/&gt; Source";
  content.style.display = isSource ? "none" : "";

  // Restore scroll so the same ratio lands at the 1/3 focal point
  const toHeight = isSource ? contentSourceHeight : contentRenderedHeight;
  wrap.scrollTop = ratio * toHeight - focal;
}

// ---------------------------------------------------------------------------
// Sidebar reveal — expand tree to show current file, highlight it
// ---------------------------------------------------------------------------
function revealTreePath(path) {
  // Clear previous active
  document.querySelectorAll("#sidebar-tree .tree-item.active").forEach(el => {
    el.classList.remove("active");
  });

  const entry = treeRowByPath[path];
  if (!entry) return;

  entry.row.classList.add("active");

  // Walk up DOM: expand all ancestor .tree-children
  let el = entry.row.parentElement;
  while (el && el.id !== "sidebar-tree") {
    if (el.classList.contains("tree-children")) {
      el.classList.add("open");
      // Also flip the arrow of the preceding tree-item
      const prevItem = el.previousElementSibling;
      if (prevItem) {
        const arrow = prevItem.querySelector(".tree-arrow");
        if (arrow) arrow.classList.add("expanded");
      }
    }
    el = el.parentElement;
  }

  // Scroll the active row into view in the sidebar
  entry.row.scrollIntoView({ block: "nearest" });
}

// ---------------------------------------------------------------------------
// Internal link handler (event delegation on #content via data-href)
// ---------------------------------------------------------------------------
document.getElementById("content").addEventListener("click", (e) => {
  const a = e.target.closest("a[data-href]");
  if (!a) return;
  e.preventDefault();
  const href = a.dataset.href;

  if (href.startsWith("#")) {
    scrollToHeader(href.slice(1));
    if (currentPath) history.replaceState({ path: currentPath }, "", "/" + toUrlPath(currentPath) + href);
  } else if (href.endsWith(".md") || href.includes(".md#")) {
    const hashIdx = href.indexOf("#");
    const filePart = hashIdx >= 0 ? href.slice(0, hashIdx) : href;
    const anchor = hashIdx >= 0 ? href.slice(hashIdx + 1) : null;
    // ./ prefix = project-root-relative (cross-KB resolved link); otherwise relative to current file
    const resolved = filePart.startsWith("./") ? filePart : resolvePath(currentPath, filePart);
    loadFile(resolved).then(() => {
      if (anchor) scrollToHeader(anchor);
    });
  }
});

// ---------------------------------------------------------------------------
// Breadcrumb (KB name + clickable folder segments)
// ---------------------------------------------------------------------------
function updateBreadcrumb(path) {
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = "";

  const kbEntry = findKbForPath(path);
  const kbName = kbEntry ? kbEntry.name : null;
  const kbPath = kbEntry ? kbEntry.path.replace(/^\.\//, "") : null;

  // Strip the KB path prefix to get the relative-to-KB path
  let relPath = path;
  if (kbPath && path.startsWith(kbPath + "/")) {
    relPath = path.slice(kbPath.length + 1);
  } else if (kbPath && path.startsWith("./" + kbPath + "/")) {
    relPath = path.slice(kbPath.length + 3);
  }

  // KB name as first segment (clickable — loads root index)
  if (kbName) {
    const a = document.createElement("a");
    a.textContent = kbName;
    // Click loads the KB root index
    const rootNode = nodeByPath[kbPath] || nodeByPath["./" + kbPath];
    a.addEventListener("click", (e) => {
      e.preventDefault();
      if (rootNode && rootNode.index) loadFile(rootNode.index.path);
    });
    bc.appendChild(a);
  }

  // Split remaining path into segments
  const segments = relPath.split("/").filter(Boolean);

  for (let i = 0; i < segments.length; i++) {
    const sep = document.createElement("span");
    sep.className = "sep";
    sep.textContent = "/";
    bc.appendChild(sep);

    // Build the accumulated path for this segment
    const accParts = [];
    if (kbPath) accParts.push(kbPath);
    for (let j = 0; j <= i; j++) accParts.push(segments[j]);
    const accumulated = accParts.join("/");

    const isLast = i === segments.length - 1;
    const node = nodeByPath[accumulated] || nodeByPath["./" + accumulated];

    if (isLast && !node) {
      // Last segment is a file (not a folder node) — plain text
      const span = document.createElement("span");
      span.textContent = segments[i];
      bc.appendChild(span);
    } else if (node) {
      // Folder segment — clickable, loads its index
      const a = document.createElement("a");
      a.textContent = segments[i];
      const targetNode = node;
      a.addEventListener("click", (e) => {
        e.preventDefault();
        if (targetNode.index) loadFile(targetNode.index.path);
        else if (targetNode.skill) loadFile(targetNode.skill.path);
      });
      bc.appendChild(a);
    } else {
      const span = document.createElement("span");
      span.textContent = segments[i];
      bc.appendChild(span);
    }
  }
}

// ---------------------------------------------------------------------------
// Fuzzy search
// ---------------------------------------------------------------------------
function doSearch() {
  const query = document.getElementById("search-input").value.trim();
  const resultsDiv = document.getElementById("search-results");
  const resultsBody = document.getElementById("search-results-body");
  const countEl = document.getElementById("search-results-count");

  if (!query) {
    closeSearch();
    return;
  }

  // Score against frontmatter only: name first, then description.
  // Name matches always rank above description-only matches.
  const scored = [];
  for (const note of allNotes) {
    const name = note.name || "";
    const desc = note.description || "";
    const mName = fuzzyMatch(query, name);
    const mDesc = fuzzyMatch(query, desc);
    if (!mName && !mDesc) continue;

    let best, bestField, bestText, sortKey;
    if (mName) {
      // Name match — prioritized (sortKey tier 0)
      best = mName; bestField = "name"; bestText = name;
      sortKey = best.gap;
    } else {
      // Description-only match — ranked after all name matches
      best = mDesc; bestField = "desc"; bestText = desc;
      sortKey = 10000 + best.gap;
    }
    scored.push({ ...note, gap: best.gap, sortKey, matchStart: best.start, matchEnd: best.end, bestField, bestText });
  }

  scored.sort((a, b) => a.sortKey - b.sortKey);
  const top = scored.slice(0, 25);

  resultsBody.innerHTML = "";

  if (top.length === 0) {
    resultsBody.innerHTML = '<div class="search-no-results">No matches found</div>';
    countEl.textContent = "0 results";
    resultsDiv.classList.add("visible");
    return;
  }

  countEl.textContent = `${scored.length} result${scored.length !== 1 ? "s" : ""}`;

  for (const hit of top) {
    const nameHtml = hit.bestField === "name"
      ? highlightMatch(query, hit.bestText, hit.matchStart, hit.matchEnd)
      : esc(hit.name || hit.path.split("/").pop());
    const descText = (hit.description || "").slice(0, 120);
    const descHtml = hit.bestField === "desc"
      ? highlightMatch(query, descText, hit.matchStart, Math.min(hit.matchEnd, descText.length - 1))
      : esc(descText);

    const div = document.createElement("div");
    div.className = "search-result";
    div.innerHTML = `
      <div class="search-result-top">
        <span class="search-result-name">${nameHtml}</span>
      </div>
      <span class="search-result-desc">${descHtml}</span>
      <span class="search-result-path">${esc(hit.path)}</span>
    `;
    div.addEventListener("click", () => {
      loadFile(hit.path);
      document.getElementById("search-input").value = "";
    });
    resultsBody.appendChild(div);
  }

  resultsDiv.classList.add("visible");
}

function closeSearch() {
  document.getElementById("search-results").classList.remove("visible");
}

// Debounced live search
document.getElementById("search-input").addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 150);
});

document.getElementById("search-input").addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    e.target.value = "";
    closeSearch();
  }
});

// Close search overlay when clicking outside
document.addEventListener("click", (e) => {
  const searchBar = document.getElementById("search-bar");
  if (!searchBar.contains(e.target)) closeSearch();
});

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ---------------------------------------------------------------------------
// Browser history (back/forward)
// ---------------------------------------------------------------------------
window.addEventListener("popstate", (e) => {
  if (e.state && e.state.path) {
    loadFile(e.state.path, { pushHistory: false });
  } else {
    // Back to welcome screen
    currentPath = null;
    document.getElementById("content").innerHTML = `
      <div class="welcome">
        <h2>Knowledge Base Viewer</h2>
        <p>Select a note from the sidebar to start reading,<br>or use the search bar to fuzzy-find across all knowledge bases.</p>
      </div>`;
    document.getElementById("breadcrumb").innerHTML = "";
    history.replaceState(null, "", "/");
  }
});

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
async function boot() {
  await init();

  // Check for ?view=graph
  const params = new URLSearchParams(window.location.search);
  if (params.get("view") === "graph") {
    setView("graph");
    return;
  }

  // If URL contains a file path, resolve KB name to filesystem path and load
  let urlPath = window.location.pathname.slice(1); // strip leading /
  if (urlPath && !urlPath.endsWith(".md")) {
    // Folder path — try index.md (strip trailing slash, append /index.md)
    urlPath = urlPath.replace(/\/+$/, "") + "/index.md";
  }
  if (urlPath && urlPath.endsWith(".md")) {
    const fsPath = fromUrlPath(urlPath);
    loadFile(fsPath, { pushHistory: false });
    history.replaceState({ path: fsPath }, "", "/" + urlPath);
  } else {
    history.replaceState(null, "", "/");
  }
}
boot();
</script>
